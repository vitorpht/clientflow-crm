<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ClientFlow CRM</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		:root {
			--cf-primary: #1e3a5f;
			--cf-primary-dark: #152a45;
			--cf-accent: #2563eb;
		}

		body {
			font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
			color: #1f2937;
		}

		.navbar {
			background-color: var(--cf-primary);
			padding-block: 0.875rem;
		}

		.navbar-brand {
			font-weight: 700;
			letter-spacing: -0.02em;
		}

		.nav-link {
			font-weight: 500;
			opacity: 0.9;
		}

		.nav-link:hover {
			opacity: 1;
		}

		.hero {
			background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
			min-height: calc(100vh - 72px);
			display: flex;
			align-items: center;
		}

		.hero-title {
			font-size: clamp(2.25rem, 5vw, 3.5rem);
			font-weight: 700;
			color: var(--cf-primary);
			letter-spacing: -0.03em;
			line-height: 1.15;
		}

		.hero-subtitle {
			font-size: clamp(1.05rem, 2vw, 1.35rem);
			color: #64748b;
			max-width: 36rem;
		}

		.btn-primary-custom {
			background-color: var(--cf-accent);
			border-color: var(--cf-accent);
			font-weight: 600;
			padding: 0.75rem 1.75rem;
			border-radius: 0.5rem;
		}

		.btn-primary-custom:hover {
			background-color: #1d4ed8;
			border-color: #1d4ed8;
		}

		.hero-card {
			background: #fff;
			border: 1px solid #e2e8f0;
			border-radius: 1rem;
			box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
		}

		.hero-badge {
			display: inline-block;
			font-size: 0.8rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: var(--cf-accent);
			background: rgba(37, 99, 235, 0.1);
			padding: 0.35rem 0.85rem;
			border-radius: 2rem;
			margin-bottom: 1.25rem;
		}
	</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark">
		<div class="container">
			<a class="navbar-brand" href="/">ClientFlow CRM</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
				aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="mainNavbar">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link active" aria-current="page" href="/">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/clients">Clients</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<section class="hero">
		<div class="container">
			<div class="row align-items-center g-5">
				<div class="col-lg-7">
					<span class="hero-badge">Business CRM</span>
					<h1 class="hero-title mb-4">ClientFlow CRM</h1>
					<p class="hero-subtitle mb-4">
						Customer Relationship Management System
					</p>
					<a href="/clients" class="btn btn-primary btn-primary-custom">View Clients</a>
				</div>
				<div class="col-lg-5 d-none d-lg-block">
					<div class="hero-card p-4 p-lg-5">
						<h2 class="h5 fw-semibold text-secondary mb-3">Manage your client relationships</h2>
						<ul class="list-unstyled mb-0 text-muted">
							<li class="mb-2 d-flex align-items-center gap-2">
								<span class="text-primary">&#10003;</span> Centralized client data
							</li>
							<li class="mb-2 d-flex align-items-center gap-2">
								<span class="text-primary">&#10003;</span> Streamlined workflows
							</li>
							<li class="d-flex align-items-center gap-2">
								<span class="text-primary">&#10003;</span> Professional business tools
							</li>
						</ul>
					</div>
				</div>
			</div>
		</div>
	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
