<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard | ClientFlow CRM</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		:root {
			--cf-primary: #1e3a5f;
			--cf-accent: #2563eb;
		}

		body {
			font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
			color: #1f2937;
			background-color: #f8fafc;
		}

		.navbar {
			background-color: var(--cf-primary);
			padding-block: 0.875rem;
		}

		.navbar-brand {
			font-weight: 700;
			letter-spacing: -0.02em;
		}

		.nav-link {
			font-weight: 500;
			opacity: 0.9;
		}

		.nav-link:hover {
			opacity: 1;
		}

		.page-header {
			padding-block: 2.5rem 1.5rem;
		}

		.page-title {
			font-weight: 700;
			color: var(--cf-primary);
			letter-spacing: -0.02em;
		}

		.stat-card {
			background: #fff;
			border: 1px solid #e2e8f0;
			border-radius: 0.75rem;
			box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
			padding: 1.5rem;
			height: 100%;
		}

		.stat-label {
			font-size: 0.8rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: #64748b;
			margin-bottom: 0.5rem;
		}

		.stat-value {
			font-size: 2.25rem;
			font-weight: 700;
			color: var(--cf-primary);
			line-height: 1;
		}

		.stat-icon {
			width: 3rem;
			height: 3rem;
			border-radius: 0.75rem;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.25rem;
			font-weight: 700;
		}

		.stat-icon-total {
			background: rgba(37, 99, 235, 0.1);
			color: var(--cf-accent);
		}

		.stat-icon-today {
			background: rgba(16, 185, 129, 0.12);
			color: #059669;
		}

		.content-card {
			background: #fff;
			border: 1px solid #e2e8f0;
			border-radius: 0.75rem;
			box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
		}

		.card-section-title {
			font-weight: 600;
			color: var(--cf-primary);
		}

		.table thead th {
			background-color: #f1f5f9;
			color: #475569;
			font-size: 0.8rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.04em;
			border-bottom: 1px solid #e2e8f0;
			white-space: nowrap;
		}

		.table tbody td {
			vertical-align: middle;
			color: #334155;
		}

		.btn-primary-custom {
			background-color: var(--cf-accent);
			border-color: var(--cf-accent);
			font-weight: 600;
		}

		.btn-primary-custom:hover {
			background-color: #1d4ed8;
			border-color: #1d4ed8;
		}

		.empty-state {
			color: #64748b;
			padding: 2.5rem 1.5rem;
			text-align: center;
		}
	</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark">
		<div class="container">
			<a class="navbar-brand" href="/">ClientFlow CRM</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
				aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="mainNavbar">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link active" aria-current="page" href="/">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/clients">Clients</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<main class="container pb-5">
		<div class="page-header d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3">
			<div>
				<h1 class="page-title h2 mb-1">Dashboard</h1>
				<p class="text-muted mb-0">Overview of your customer relationship management</p>
			</div>
			<a href="/clients" class="btn btn-primary btn-primary-custom">View Clients</a>
		</div>

		<div class="row g-4 mb-4">
			<div class="col-md-6">
				<div class="stat-card">
					<div class="d-flex justify-content-between align-items-start">
						<div>
							<div class="stat-label">Total Clients</div>
							<div class="stat-value" th:text="${totalClients}">0</div>
						</div>
						<div class="stat-icon stat-icon-total">#</div>
					</div>
				</div>
			</div>
			<div class="col-md-6">
				<div class="stat-card">
					<div class="d-flex justify-content-between align-items-start">
						<div>
							<div class="stat-label">Clients Created Today</div>
							<div class="stat-value" th:text="${clientsCreatedToday}">0</div>
						</div>
						<div class="stat-icon stat-icon-today">+</div>
					</div>
				</div>
			</div>
		</div>

		<div class="content-card">
			<div class="p-4 border-bottom">
				<h2 class="card-section-title h5 mb-0">Latest 5 Clients</h2>
			</div>

			<div th:if="${#lists.isEmpty(latestClients)}" class="empty-state">
				<p class="mb-0">No clients found</p>
			</div>

			<div th:unless="${#lists.isEmpty(latestClients)}" class="table-responsive">
				<table class="table table-hover mb-0">
					<thead>
						<tr>
							<th scope="col">Name</th>
							<th scope="col">Email</th>
							<th scope="col">Company</th>
							<th scope="col">Created At</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="client : ${latestClients}">
							<td th:text="${client.name}">John Doe</td>
							<td th:text="${client.email}">john@example.com</td>
							<td th:text="${client.company} ?: '-'">Acme Inc.</td>
							<td th:text="${#temporals.format(client.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
