<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Add Client | ClientFlow CRM</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		:root {
			--cf-primary: #1e3a5f;
			--cf-accent: #2563eb;
		}

		body {
			font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
			color: #1f2937;
			background-color: #f8fafc;
		}

		.navbar {
			background-color: var(--cf-primary);
			padding-block: 0.875rem;
		}

		.navbar-brand {
			font-weight: 700;
			letter-spacing: -0.02em;
		}

		.nav-link {
			font-weight: 500;
			opacity: 0.9;
		}

		.nav-link:hover {
			opacity: 1;
		}

		.page-header {
			padding-block: 2.5rem 1.5rem;
		}

		.page-title {
			font-weight: 700;
			color: var(--cf-primary);
			letter-spacing: -0.02em;
		}

		.content-card {
			background: #fff;
			border: 1px solid #e2e8f0;
			border-radius: 0.75rem;
			box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
			padding: 2rem;
			max-width: 640px;
		}

		.form-label {
			font-weight: 600;
			color: #475569;
		}

		.btn-primary-custom {
			background-color: var(--cf-accent);
			border-color: var(--cf-accent);
			font-weight: 600;
		}

		.btn-primary-custom:hover {
			background-color: #1d4ed8;
			border-color: #1d4ed8;
		}
	</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark">
		<div class="container">
			<a class="navbar-brand" href="/">ClientFlow CRM</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
				aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="mainNavbar">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link" href="/">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link active" aria-current="page" href="/clients">Clients</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<main class="container pb-5">
		<div class="page-header">
			<h1 class="page-title h2 mb-1">Add Client</h1>
			<p class="text-muted mb-0">Create a new customer record</p>
		</div>

		<div class="content-card">
			<form th:action="@{/clients}" th:object="${client}" method="post" novalidate>
				<div class="mb-3">
					<label for="name" class="form-label">Name</label>
					<input type="text" class="form-control" id="name" th:field="*{name}"
						th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
					<div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
				</div>

				<div class="mb-3">
					<label for="email" class="form-label">Email</label>
					<input type="email" class="form-control" id="email" th:field="*{email}"
						th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
					<div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
				</div>

				<div class="mb-3">
					<label for="phone" class="form-label">Phone</label>
					<input type="text" class="form-control" id="phone" th:field="*{phone}"
						th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
					<div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
				</div>

				<div class="mb-4">
					<label for="company" class="form-label">Company</label>
					<input type="text" class="form-control" id="company" th:field="*{company}"
						th:classappend="${#fields.hasErrors('company')} ? 'is-invalid'">
					<div class="invalid-feedback" th:if="${#fields.hasErrors('company')}" th:errors="*{company}"></div>
				</div>

				<div class="d-flex flex-wrap gap-2">
					<button type="submit" class="btn btn-primary btn-primary-custom">Save</button>
					<a href="/clients" class="btn btn-outline-secondary">Cancel</a>
				</div>
			</form>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
